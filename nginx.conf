# ════════════════════════════════════════════════════
# iSafe CRM · Nginx — Proxy Reverso com SSL
# Salve em: /etc/nginx/sites-available/isafe-crm
# Ative:    ln -s /etc/nginx/sites-available/isafe-crm /etc/nginx/sites-enabled/
# SSL:      certbot --nginx -d crm.lojaisafe.com.br
# ════════════════════════════════════════════════════

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name crm.lojaisafe.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name crm.lojaisafe.com.br;

    # ── SSL (gerado pelo Certbot) ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/crm.lojaisafe.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.lojaisafe.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;

    # ── Security Headers ──────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # ── Gzip ──────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # ── Logs ──────────────────────────────────────────
    access_log /var/log/nginx/isafe-crm-access.log;
    error_log  /var/log/nginx/isafe-crm-error.log;

    # ── Webhook Bling (limite maior para payloads) ─────
    location /webhook/ {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 2m;
        proxy_read_timeout 30s;
    }

    # ── API e Dashboard ───────────────────────────────
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        client_max_body_size 5m;
    }
}
